services:
  app:
    build:
      context: ./TrilobitCS
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=trilobit;Username=trilobit;Password=trilobit

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trilobit
      POSTGRES_USER: trilobit
      POSTGRES_PASSWORD: trilobit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trilobit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
