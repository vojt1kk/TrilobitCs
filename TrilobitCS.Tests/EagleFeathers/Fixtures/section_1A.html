<!DOCTYPE html>
<html lang="cs">
<head><meta charset="utf-8"><title>Orlí pera.cz</title></head>
<body>
<div class="container-xxl ps-4 pe-4 py-5">
  <div class="row">
    <div class="col-md-12 col-lg-8 m-auto op-list op-list-prehled">
      <div class="text-end mb-1"><a href="/svitek_1svetlo">1. světlo</a></div>
      <h1>1A Atletika - běhy</h1>
      <div style="margin-top:20px;">VL + ML</div>

      <!-- Feather 1A1 — table format -->
      <div class="mt-4">
        <div class="op-list-tool float-end ms-3 mb-3">
          <i class="fa-solid fa-paste op-tool" onclick="toClipboardText('https://orlipera.cz/1A1')"></i>
        </div>
        <div class="mb-2">
          <h2 class="d-inline"><a href="/svitek_1svetlo?op=1A1">1A1 Běh na 100 m</a></h2>
        </div>
        <div>
          [s]
          <table border="1" class="oramovani" summary="1A1">
            <thead>
              <tr>
                <th><div style="text-align:center;">14–15 let</div></th>
                <th><div style="text-align:center;">16–17 let</div></th>
                <th><div align="center">&nbsp;</div></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><div style="text-align:center;">16,1</div></td>
                <td><div style="text-align:center;">15,6</div></td>
                <td><div align="center">ČIN</div></td>
              </tr>
              <tr>
                <td><div style="text-align:center;">15,1</div></td>
                <td><div style="text-align:center;">14,6</div></td>
                <td nowrap="nowrap"><div align="center">V. ČIN</div></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="OpPoznamka"></div>
        <div class="OpML"><b>ML:</b> Běh na 60 m: D10–11 <strong>11,0 s</strong>;</div>
      </div>

      <!-- Feather 1A2 — table format -->
      <div class="mt-4">
        <div class="op-list-tool float-end ms-3 mb-3">
          <i class="fa-solid fa-paste op-tool" onclick="toClipboardText('https://orlipera.cz/1A2')"></i>
        </div>
        <div class="mb-2">
          <h2 class="d-inline"><a href="/svitek_1svetlo?op=1A2">1A2 Běh na 1500 m</a></h2>
        </div>
        <div>
          [min]
          <table class="oramovani" summary="1A2">
            <thead>
              <tr>
                <th colspan="2"><div align="center">14-15 let</div></th>
                <th><div align="center">&nbsp;</div></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><div align="center">7:00</div></td>
                <td><div align="center">6:00</div></td>
                <td><div align="center">ČIN</div></td>
              </tr>
              <tr>
                <td><div align="center">6:20</div></td>
                <td><div align="center">5:30</div></td>
                <td nowrap="nowrap"><div align="center">V. ČIN</div></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="OpPoznamka"></div>
        <div class="OpML"><b>ML:</b> D10–11 <strong>8:00 min</strong></div>
      </div>

    </div>
  </div>
</div>
</body>
</html>
